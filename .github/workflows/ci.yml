name: CI

run-name: CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ai-runtime-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      AI_RUNTIME_LLM_PROVIDER: stub
      AI_RUNTIME_TOOL_AUDIT_LOG_PATH: runtime_data/audit/tool-events.jsonl
      AI_RUNTIME_OBSERVABILITY_LOG_PATH: runtime_data/observability/runtime-events.jsonl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Compile sources
        run: python -m compileall src tests scripts

      - name: Run unit tests
        run: pytest

      - name: Run local quality harness
        run: python scripts/run_quality.py --run-id ci-quality

      - name: Build container image
        run: docker build -t alibaba-llm-ai-runtime:ci .

      - name: Run container smoke check
        run: ./scripts/smoke_container.sh alibaba-llm-ai-runtime:ci

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-quality-${{ github.run_id }}
          if-no-files-found: error
          path: |
            runtime_data/quality/ci-quality/summary.json
            runtime_data/quality/ci-quality/brief.md
            runtime_data/quality/ci-quality/tool-events.jsonl

  publish_image:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish_acr_image:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check ACR secrets
        id: acr_secrets
        run: |
          if [ -n "${ACR_REGISTRY}" ] && [ -n "${ACR_USERNAME}" ] && [ -n "${ACR_PASSWORD}" ] && [ -n "${ACR_NAMESPACE}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "ACR secrets are not configured, skipping ACR publish."
          fi

      - name: Log in to Alibaba Cloud Container Registry
        if: steps.acr_secrets.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Extract ACR image metadata
        if: steps.acr_secrets.outputs.enabled == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build and push image to ACR
        if: steps.acr_secrets.outputs.enabled == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
